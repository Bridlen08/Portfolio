<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bridleen P — Portfolio</title>
    <!--
      CRITICAL: This inline script runs SYNCHRONOUSLY before React renders.
      It reads the saved theme from localStorage and immediately applies
      the 'dark' class to <html>, preventing the white flash (FOUC).
      DO NOT move this to a deferred or async script.
    -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (saved === 'dark' || (!saved && prefersDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
